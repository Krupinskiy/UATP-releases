name: Feature Request
description: Suggest a new feature or improvement for UATP
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please fill out the form below.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear and concise description of the feature you'd like.
      placeholder: Describe the feature...
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why is this needed?
      description: Explain the problem this feature would solve or why it would be useful.
      placeholder: Describe the motivation or use case...
    validations:
      required: true

  - type: textarea
    id: implementation
    attributes:
      label: Possible Implementation
      description: If you have ideas on how this could be implemented, describe them here.
      placeholder: Describe a possible approach...
    validations:
      required: false
